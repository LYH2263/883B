version: '3.8'

services:
  backend:
    build: ./backend
    container_name: laravel_backend
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: laravel
      DB_USERNAME: sail
      DB_PASSWORD: password
    depends_on:
      - db
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor

  frontend:
    build: ./frontend
    container_name: react_frontend
    ports:
      - "3000:5173"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  db:
    image: postgres:17
    container_name: postgres_db
    environment:
      POSTGRES_DB: laravel
      POSTGRES_USER: sail
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
